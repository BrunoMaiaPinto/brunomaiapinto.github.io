<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="img/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="img/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="img/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="img/favicon_io/site.webmanifest" />

    <link href="style.css" rel="stylesheet" />
    <script defer src="script.js"></script>

    <title>Bruno Pinto</title>
  </head>
  <body>
    <header class="header">
      <div class="header__nav">
        <a href="#" class="header__logo">Bruno Pinto</a>

        <ul class="header__links">
          <li>
            <a
              href="https://github.com/BrunoMaiaPinto"
              target="_blank"
              class="header__link"
            >
              <ion-icon name="logo-github" class="header__icon"></ion-icon
            ></a>
          </li>

          <li>
            <a
              href="https://www.linkedin.com/in/brunommpinto/"
              target="_blank"
              class="header__link"
              ><ion-icon name="logo-linkedin" class="header__icon"></ion-icon
            ></a>
          </li>

          <li>
            <a href="mailto:brunommpinto@sapo.pt" class="header__link"
              ><ion-icon name="archive-outline" class="header__icon"></ion-icon
            ></a>
          </li>
        </ul>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero__text-box">
          <h1 class="hero__heading">Hello there, I'm Bruno!</h1>
          <p class="hero__text">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequatur
            architecto at fugit quasi aspernatur quos fugiat ducimus eius
            numquam. Exercitationem repudiandae iure beatae sint libero nam
            possimus perferendis voluptatum temporibus!
          </p>
          <h2>Soft Skills:</h2>
          <div class="soft-skill">
            <ion-icon name="logo-html5" class="skill-logo"></ion-icon>
            <ion-icon name="logo-css3" class="skill-logo"></ion-icon>
            <ion-icon name="logo-sass" class="skill-logo"></ion-icon>
            <ion-icon name="logo-javascript" class="skill-logo"></ion-icon>
          </div>
        </div>
        <img src="img/hero.jpg" alt="hero img" class="hero__img" />
      </section>
    </main>

    <footer class="footer" id="footer"></footer>
  </body>
</html>
